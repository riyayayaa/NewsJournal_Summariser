<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Entry</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<nav class="navbar">
    <span class="brand">📰 News Journal</span>
    <div class="nav-links">
        <a href="/">Journal</a>
        <a href="/chat">💬 Chat</a>
        <a href="/news">🌐 News Feed</a>
    </div>
</nav>
<main class="container">
    <section class="card" style="max-width:700px;margin:auto">
        <h2>Edit Entry</h2>
        <form th:action="@{/entries/{id}/edit(id=${entry.id})}" method="post">
            <input type="text" name="title" th:value="${entry.title}" class="input" required/>
            <textarea name="content" rows="10" class="input" required th:text="${entry.content}"></textarea>
            <div style="display:flex;gap:1rem">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/" class="btn btn-edit">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
