spring.application.name=newss

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/newsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Groq
groq.api-key=${GROQ_API_KEY:your_groq_api_key_here}
groq.model=llama-3.1-8b-instant

# NewsAPI
newsapi.key=${NEWSAPI_KEY:your_newsapi_key_here}
newsapi.base-url=https://newsapi.org/v2
